[build]
  base = "mobile"
  command = "bash scripts/netlify-build.sh"
  publish = "build/web"

[build.environment]
  # Set your live API URL in Netlify: Site settings → Environment variables
  API_BASE_URL = "https://your-api-url.com/api"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
