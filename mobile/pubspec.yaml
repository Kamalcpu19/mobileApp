name: workshop_service_advisor
description: Workshop Service Advisor mobile app for RO workflow management.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2
  dio: ^5.7.0
  shared_preferences: ^2.3.3
  flutter_secure_storage: ^9.2.2
  intl: ^0.19.0
  equatable: ^2.0.7
  url_launcher: ^6.3.1
  image_picker: ^1.1.2
  speech_to_text: ^7.0.0
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
